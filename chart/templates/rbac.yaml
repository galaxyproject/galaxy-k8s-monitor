apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "galaxy-k8s-monitor.fullname" . }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "galaxy-k8s-monitor.fullname" . }}
subjects:
  - kind: ServiceAccount
    name: {{ include "galaxy-k8s-monitor.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "galaxy-k8s-monitor.fullname" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "galaxy-k8s-monitor.fullname" . }}-metrics
rules:
  - apiGroups: ["metrics.k8s.io"]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "galaxy-k8s-monitor.fullname" . }}-metrics
subjects:
  - kind: ServiceAccount
    name: {{ include "galaxy-k8s-monitor.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "galaxy-k8s-monitor.fullname" . }}-metrics

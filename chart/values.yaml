replicaCount: 1

image:
  repository: afgane/galaxy-k8s-monitor
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: ""

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: galaxy-k8s-monitor.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 50Mi
  limits:
    cpu: 50m
    memory: 50Mi

monitor:
  namespace: galaxy
  intervalSeconds: 30
  retentionHours: 24
  basePath: /
